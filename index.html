let filtered=[...PROJECTS], selected=0, scale=1, tx=0, ty=0, dragging=false, last=null;
const $=id=>document.getElementById(id); const svg=$('map'), vp=$('viewport');
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function cls(c){ if(c>=20)return'most'; if(c>=4)return'more'; if(c>0)return'work'; return''; }
function renderStates(){ $('states').innerHTML=STATES.map(s=>`<path class="state ${cls(s.count)}" data-state="${s.code}" d="${s.d}"><title>${esc(s.name)}${s.count?' - '+s.count+' projects':''}</title></path>`).join(''); document.querySelectorAll('.state').forEach(el=>el.addEventListener('click',()=>{$('stateFilter').value=el.dataset.state; applyFilters(); zoomToFiltered();})); }
function populateFilters(){ const states=[...new Set(PROJECTS.map(p=>p.state).filter(Boolean))].sort(); const types=[...new Set(PROJECTS.map(p=>p.type).filter(Boolean))].sort(); $('stateFilter').innerHTML='<option value="">All states</option>'+states.map(s=>`<option value="${s}">${s}</option>`).join(''); $('typeFilter').innerHTML='<option value="">All project types</option>'+types.map(t=>`<option>${esc(t)}</option>`).join(''); }
function applyFilters(){ const q=$('search').value.toLowerCase(), st=$('stateFilter').value, ty=$('typeFilter').value; filtered=PROJECTS.filter(p=>(!st||p.state===st)&&(!ty||p.type===ty)&&(!q||[p.name,p.client,p.locality,p.stateName,p.type,...(p.themes||[])].join(' ').toLowerCase().includes(q))); selected=Math.min(selected,Math.max(0,filtered.length-1)); renderList(); renderPoints(); renderDetail(); }
function grouped(){ const m=new Map(); filtered.forEach(p=>{const k=`${p.x},${p.y}`; if(!m.has(k))m.set(k,[]); m.get(k).push(p);}); return [...m.values()]; }
function renderPoints(){ const groups=grouped(); $('points').innerHTML=groups.map(g=>{const p=g[0], r=Math.max(5,Math.min(15,5+Math.sqrt(g.length)*3)); return `<circle class="dot" data-id="${esc(p.id)}" cx="${p.x}" cy="${p.y}" r="${r}"><title>${esc(p.locality)}, ${esc(p.state)} - ${g.length} project${g.length===1?'':'s'}</title></circle>`;}).join(''); document.querySelectorAll('.dot').forEach(el=>el.addEventListener('click',()=>{const i=filtered.findIndex(p=>p.id===el.dataset.id); selectProject(i,true);})); highlightDot(); }
function renderList(){ $('counts').textContent=`${filtered.length} of ${PROJECTS.length} projects shown`; $('list').innerHTML=filtered.map((p,i)=>`<article class="item ${i===selected?'active':''}" data-i="${i}"><h3>${esc(p.name||'Untitled project')}</h3><p>${esc(p.locality)}, ${esc(p.state)} | ${esc(p.type)}${p.year?' | '+esc(p.year):''}</p></article>`).join(''); document.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>selectProject(Number(el.dataset.i),true))); }
function renderDetail(){ if(!filtered.length){$('detail').innerHTML='<h2>No projects match</h2><div class="meta">Clear filters to restore the map.</div>'; return;} const p=filtered[selected]; $('detail').innerHTML=`<h2>${esc(p.name||'Untitled project')}</h2><div class="meta">${esc(p.locality)}, ${esc(p.stateName||p.state)}${p.year?' | '+esc(p.year):''}</div><dl><dt>Client</dt><dd>${esc(p.client||'Not listed')}</dd><dt>Type</dt><dd>${esc(p.type)}</dd><dt>Place</dt><dd>${esc(p.locality)}, ${esc(p.state)}</dd></dl><div class="chips">${(p.themes||[]).slice(0,6).map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>`; document.querySelectorAll('.item').forEach(el=>el.classList.toggle('active',Number(el.dataset.i)===selected)); const active=document.querySelector(`.item[data-i="${selected}"]`); if(active)active.scrollIntoView({block:'nearest'}); highlightDot(); }
function highlightDot(){ document.querySelectorAll('.dot').forEach(el=>el.classList.toggle('active', filtered[selected] && el.dataset.id===filtered[selected].id)); }
function setTransform(){ vp.setAttribute('transform',`translate(${tx} ${ty}) scale(${scale})`); }
function zoom(f,cx=600,cy=390){ const ns=Math.max(.8,Math.min(7,scale*f)); tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale); scale=ns; setTransform(); }
function zoomToFiltered(){ if(!filtered.length)return; const xs=filtered.map(p=>p.x), ys=filtered.map(p=>p.y); const minX=Math.min(...xs)-50,maxX=Math.max(...xs)+50,minY=Math.min(...ys)-50,maxY=Math.max(...ys)+50; const sx=1200/(maxX-minX), sy=780/(maxY-minY); scale=Math.max(.9,Math.min(5,Math.min(sx,sy))); tx=(1200-(minX+maxX)*scale)/2; ty=(780-(minY+maxY)*scale)/2; setTransform(); }
function selectProject(i,z){ if(!filtered.length)return; selected=(i+filtered.length)%filtered.length; if(z){const p=filtered[selected]; scale=Math.max(scale,2.2); tx=1200/2-p.x*scale; ty=780/2-p.y*scale; setTransform();} renderDetail(); }
svg.addEventListener('wheel',e=>{e.preventDefault(); const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const loc=pt.matrixTransform(svg.getScreenCTM().inverse()); zoom(e.deltaY<0?1.18:.85,loc.x,loc.y);},{passive:false});
$('mapwrap').addEventListener('mousedown',e=>{dragging=true;last=[e.clientX,e.clientY];$('mapwrap').classList.add('dragging');}); window.addEventListener('mouseup',()=>{dragging=false;$('mapwrap').classList.remove('dragging');}); window.addEventListener('mousemove',e=>{if(!dragging)return; tx+=e.clientX-last[0]; ty+=e.clientY-last[1]; last=[e.clientX,e.clientY]; setTransform();});
$('zoomIn').onclick=()=>zoom(1.25); $('zoomOut').onclick=()=>zoom(.8); $('reset').onclick=()=>{scale=1;tx=0;ty=0;setTransform();}; $('zoomSelection').onclick=zoomToFiltered; $('prev').onclick=()=>selectProject(selected-1,true); $('next').onclick=()=>selectProject(selected+1,true); $('search').oninput=applyFilters; $('stateFilter').onchange=()=>{applyFilters();zoomToFiltered();}; $('typeFilter').onchange=applyFilters;
renderStates(); populateFilters(); applyFilters(); setTransform();
</script>
