<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPR National Experience Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --ink:#1f2a30; --muted:#60707a; --line:#d8dee2; --blue:#3ea8dd; --pale:#d8eef8; --bg:#eef3f5; --white:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:var(--bg); }
    .app { height:100vh; display:grid; grid-template-columns:392px 1fr; overflow:hidden; }
    aside { background:white; border-right:1px solid var(--line); display:flex; flex-direction:column; min-width:0; }
    header { padding:18px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:22px; line-height:1.1; }
    .counts { margin-top:8px; color:var(--muted); font-size:13px; }
    .controls { padding:14px 18px; display:grid; gap:10px; border-bottom:1px solid var(--line); }
    input, select, button { font:inherit; }
    input, select { width:100%; border:1px solid var(--line); border-radius:6px; padding:10px 11px; background:white; color:var(--ink); font-size:14px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btnrow { display:grid; grid-template-columns:68px 1fr 68px; gap:8px; }
    button { border:1px solid var(--line); border-radius:6px; background:white; color:var(--ink); padding:9px 10px; cursor:pointer; font-weight:700; }
    button:hover { border-color:#9db6c4; background:#f7fbfd; }
    button.primary { background:var(--ink); color:white; border-color:var(--ink); }
    .list { overflow:auto; padding:10px; display:grid; gap:8px; }
    .item { border:1px solid var(--line); background:white; border-radius:7px; padding:10px; cursor:pointer; }
    .item:hover, .item.active { border-color:var(--blue); box-shadow:0 0 0 2px rgba(62,168,221,.15); }
    .item h3 { margin:0 0 5px; font-size:14px; line-height:1.2; }
    .item p { margin:0; color:var(--muted); font-size:12px; line-height:1.35; }
    main { position:relative; min-width:0; background:#eef3f5; }
    #map { width:100%; height:100%; min-height:360px; background:#dfe8ed; }
    .detail { position:absolute; right:18px; top:18px; width:min(420px, calc(100% - 36px)); background:white; border:1px solid var(--line); border-radius:8px; box-shadow:0 18px 50px rgba(31,42,48,.16); padding:16px; z-index:500; }
    .detail h2 { margin:0 0 8px; font-size:20px; line-height:1.15; }
    .meta { color:var(--muted); font-size:13px; margin-bottom:12px; }
    .summary { margin:0 0 14px; font-size:13px; line-height:1.45; color:#33434b; }
    .detail dl { display:grid; grid-template-columns:90px 1fr; gap:8px 12px; margin:0; font-size:13px; }
    .detail dt { color:var(--muted); }
    .detail dd { margin:0; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .chip { background:var(--pale); border:1px solid #b8dced; border-radius:999px; padding:4px 8px; font-size:12px; }
    .pin { width:18px; height:18px; border-radius:50%; background:#1f2a30; border:2px solid #fff; box-shadow:0 1px 7px rgba(0,0,0,.32); }
    .pin.multi { background:#3ea8dd; width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:white; font-size:10px; font-weight:800; border-color:white; }
    .pin.active { background:#f2b84b; border-color:#1f2a30; }
    .leaflet-popup-content { margin:10px 12px; font-size:13px; }
    .leaflet-control-attribution { font-size:10px; }
    .leaflet-tile { opacity:1 !important; }
    @media(max-width:860px) { .app { grid-template-columns:1fr; grid-template-rows:48vh 52vh; } aside { grid-row:2; border-right:0; border-top:1px solid var(--line); } main { grid-row:1; } .detail { display:none; } }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header>
        <h1>EPR National Experience</h1>
        <div class="counts" id="counts">Loading projects...</div>
      </header>
      <section class="controls">
        <input id="search" type="search" placeholder="Search project, locality, client">
        <div class="row">
          <select id="stateFilter"><option value="">All states</option></select>
          <select id="typeFilter"><option value="">All project types</option></select>
        </div>
        <div class="btnrow">
          <button id="prev">Prev</button>
          <button id="zoomSelection" class="primary">Zoom selected</button>
          <button id="next">Next</button>
        </div>
      </section>
      <section class="list" id="list"></section>
    </aside>
    <main>
      <div id="map" aria-label="OpenStreetMap with EPR project locations"></div>
      <section class="detail" id="detail"></section>
    </main>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    const escapeHtml = value => String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    let projects = [];
    let filtered = [];
    let selected = 0;
    let markers = [];
    let markerByProjectId = new Map();
    let markerLayer;

    const map = L.map('map', { preferCanvas: true, zoomControl: true, worldCopyJump: true, fadeAnimation: false, zoomAnimation: false }).setView([38.2, -96.2], 4);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    markerLayer = L.layerGroup().addTo(map);

    function groupKey(p) { return `${p.lat.toFixed(4)},${p.lon.toFixed(4)}`; }
    function groupProjects(rows) {
      const grouped = new Map();
      rows.forEach((p, index) => {
        const key = groupKey(p);
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push({ project: p, index });
      });
      return Array.from(grouped.values());
    }
    function makeIcon(count, active) {
      const cls = `${count > 1 ? 'pin multi' : 'pin'}${active ? ' active' : ''}`;
      const html = count > 1 ? `<div class="${cls}">${count}</div>` : `<div class="${cls}"></div>`;
      const size = count > 1 ? 24 : 18;
      return L.divIcon({ html, className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2] });
    }
    function cleanList(values) {
      return [...new Set((values || []).map(v => String(v || '').trim()).filter(Boolean).filter(v => v.toLowerCase() !== 'other'))];
    }
    function projectSummary(p) {
      if (p.summary) return p.summary;
      const type = p.type || 'project support';
      const typeLower = type.toLowerCase();
      const themes = cleanList(p.themes).filter(t => t.toLowerCase() !== typeLower);
      const workText = themes.length ? ` Support areas noted in the project record include ${themes.slice(0, 3).join(', ')}.` : '';
      const yearText = p.year ? ` The project record lists ${p.year} as the associated year.` : '';
      const clientValue = String(p.client || '').trim();
      const placeValue = `${p.locality}, ${p.state}`.toLowerCase();
      const clientText = clientValue && clientValue !== p.name && clientValue.toLowerCase() !== placeValue ? ` The listed client is ${clientValue}.` : '';
      return `EPR project experience in ${p.locality}, ${p.stateName || p.state} for ${p.name || 'this project'}. The work is categorized as ${type}.${workText}${clientText}${yearText}`;
    }
    function projectLatLng(p) {
      return L.latLng(Number(p.lat), Number(p.lon));
    }
    function popupHtml(group) {
      const first = group[0].project;
      if (group.length === 1) {
        return `<strong>${escapeHtml(first.name || first.locality)}</strong><br><span>${escapeHtml(first.locality)}, ${escapeHtml(first.state)}</span><p style="margin:8px 0 0">${escapeHtml(projectSummary(first))}</p>`;
      }
      const items = group.slice(0, 5).map(g => `<li>${escapeHtml(g.project.name || 'Untitled project')}</li>`).join('');
      const more = group.length > 5 ? `<li>${group.length - 5} more projects at this location</li>` : '';
      return `<strong>${escapeHtml(first.locality)}, ${escapeHtml(first.state)}</strong><br>${group.length} projects at this location<ul style="margin:8px 0 0 18px;padding:0">${items}${more}</ul>`;
    }
    function populateFilters() {
      const states = [...new Set(projects.map(p => p.state).filter(Boolean))].sort();
      const types = [...new Set(projects.map(p => p.type).filter(Boolean))].sort();
      $('stateFilter').innerHTML = '<option value="">All states</option>' + states.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
      $('typeFilter').innerHTML = '<option value="">All project types</option>' + types.map(t => `<option>${escapeHtml(t)}</option>`).join('');
    }
    function applyFilters() {
      const query = $('search').value.toLowerCase();
      const state = $('stateFilter').value;
      const type = $('typeFilter').value;
      filtered = projects.filter(p => {
        const haystack = [p.name, p.client, p.locality, p.stateName, p.type, ...(p.themes || [])].join(' ').toLowerCase();
        return (!state || p.state === state) && (!type || p.type === type) && (!query || haystack.includes(query));
      });
      selected = Math.min(selected, Math.max(0, filtered.length - 1));
      renderAll();
    }
    function renderAll() {
      renderMarkers();
      renderList();
      renderDetail();
      $('counts').textContent = `${filtered.length} of ${projects.length} projects shown`;
    }
    function renderMarkers() {
      markerLayer.clearLayers();
      markers = [];
      markerByProjectId = new Map();
      groupProjects(filtered).forEach(group => {
        const first = group[0].project;
        const active = filtered[selected] && group.some(g => g.project.id === filtered[selected].id);
        const marker = L.marker(projectLatLng(first), { icon: makeIcon(group.length, active) }).addTo(markerLayer);
        marker.bindPopup(popupHtml(group));
        marker.on('click', () => selectProject(group[0].index, true));
        group.forEach(g => markerByProjectId.set(g.project.id, marker));
        markers.push(marker);
      });
    }
    function renderList() {
      $('list').innerHTML = filtered.map((p, i) => `<article class="item ${i === selected ? 'active' : ''}" data-index="${i}"><h3>${escapeHtml(p.name || 'Untitled project')}</h3><p>${escapeHtml(p.locality)}, ${escapeHtml(p.state)} | ${escapeHtml(p.type)}${p.year ? ' | ' + escapeHtml(p.year) : ''}</p></article>`).join('');
      document.querySelectorAll('.item').forEach(item => item.addEventListener('click', () => selectProject(Number(item.dataset.index), true)));
    }
    function renderDetail() {
      if (!filtered.length) {
        $('detail').innerHTML = '<h2>No projects match</h2><div class="meta">Clear filters to restore the map.</div>';
        return;
      }
      const p = filtered[selected];
      $('detail').innerHTML = `<h2>${escapeHtml(p.name || 'Untitled project')}</h2><div class="meta">${escapeHtml(p.locality)}, ${escapeHtml(p.stateName || p.state)}${p.year ? ' | ' + escapeHtml(p.year) : ''}</div><p class="summary">${escapeHtml(projectSummary(p))}</p><dl><dt>Client</dt><dd>${escapeHtml(p.client || 'Not listed')}</dd><dt>Type</dt><dd>${escapeHtml(p.type)}</dd><dt>Place</dt><dd>${escapeHtml(p.locality)}, ${escapeHtml(p.state)}</dd></dl><div class="chips">${(p.themes || []).slice(0, 6).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>`;
      document.querySelectorAll('.item').forEach(item => item.classList.toggle('active', Number(item.dataset.index) === selected));
      const active = document.querySelector(`.item[data-index="${selected}"]`);
      if (active) active.scrollIntoView({ block: 'nearest' });
    }
    function selectProject(index, zoom) {
      if (!filtered.length) return;
      selected = (index + filtered.length) % filtered.length;
      renderAll();
      if (zoom) zoomToSelectedProject(true);
    }
    function zoomToSelectedProject(openPopup) {
      if (!filtered.length) return;
      const p = filtered[selected];
      const target = projectLatLng(p);
      const zoom = Math.max(map.getZoom(), 10);
      map.closePopup();
      map.invalidateSize({ pan: false });
      map.setView(target, zoom, { animate: false });
      setTimeout(() => {
        map.invalidateSize({ pan: false });
        map.panTo(target, { animate: false });
        const marker = markerByProjectId.get(p.id);
        if (openPopup && marker) marker.openPopup();
      }, 0);
    }
    function zoomToResults() {
      if (!filtered.length) return;
      const bounds = L.latLngBounds(filtered.map(p => [p.lat, p.lon]));
      map.fitBounds(bounds.pad(0.22), { maxZoom: 9 });
    }

    $('search').addEventListener('input', applyFilters);
    $('stateFilter').addEventListener('change', () => { applyFilters(); zoomToResults(); });
    $('typeFilter').addEventListener('change', applyFilters);
    $('prev').addEventListener('click', () => selectProject(selected - 1, true));
    $('next').addEventListener('click', () => selectProject(selected + 1, true));
    $('zoomSelection').addEventListener('click', () => zoomToSelectedProject(true));

    fetch('data/projects.json')
      .then(response => response.json())
      .then(data => {
        projects = data.filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lon)).sort((a, b) => `${a.state} ${a.locality} ${a.name}`.localeCompare(`${b.state} ${b.locality} ${b.name}`));
        filtered = projects;
        populateFilters();
        renderAll();
        zoomToResults();
        setTimeout(() => map.invalidateSize(), 150);
      })
      .catch(error => {
        $('counts').textContent = 'Project data failed to load.';
        $('detail').innerHTML = `<h2>Map data error</h2><div class="meta">${escapeHtml(error.message)}</div>`;
      });
  </script>
</body>
</html>
